<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>番茄钟</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
  <div id="window-controls">
    <button id="btn-theme" class="window-btn" title="切换主题">
      <svg class="icon-sun" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
        <circle cx="10" cy="10" r="4"/>
        <path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M3.5 16.5l1.4-1.4M15.1 4.9l1.4-1.4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
      <svg class="icon-moon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
        <path d="M17 12.5a7 7 0 01-9.5-9.5 7 7 0 109.5 9.5z"/>
      </svg>
    </button>
    <button id="btn-fullscreen" class="window-btn" title="全屏">
      <svg class="icon-expand" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 00-2 2v3"/>
        <path d="M21 8V5a2 2 0 00-2-2h-3"/>
        <path d="M3 16v3a2 2 0 002 2h3"/>
        <path d="M16 21h3a2 2 0 002-2v-3"/>
      </svg>
      <svg class="icon-collapse" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3v3a2 2 0 01-2 2H3"/>
        <path d="M21 8h-3a2 2 0 01-2-2V3"/>
        <path d="M3 16h3a2 2 0 012 2v3"/>
        <path d="M16 21v-3a2 2 0 012-2h3"/>
      </svg>
    </button>
    <button id="btn-settings" class="window-btn" title="设置">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
  <canvas id="three-canvas"></canvas>
  <canvas id="ring-canvas"></canvas>
  <div id="timer-overlay">
    <div id="mode-label">专注</div>
    <div id="time-display">25:00</div>
    <div id="pomodoro-dots"></div>
    <div id="controls">
      <button id="btn-play" class="pill-btn" title="开始 / 暂停">
        <svg id="icon-play" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path d="M6 3l12 7-12 7V3z"/>
        </svg>
        <svg id="icon-pause" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" style="display:none">
          <path d="M6 3h3v14H6V3zm5 0h3v14h-3V3z"/>
        </svg>
      </button>
      <button id="btn-reset" class="pill-btn" title="重置">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path d="M10 3a7 7 0 016.4 4.5L18 6l-2 5-5-2 1.6-.8A5 5 0 1010 15v2a7 7 0 010-14z"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="settings-backdrop">
    <div id="settings-card">
      <div class="settings-header-bar">
        <h2 class="settings-title">设置</h2>
        <button id="settings-close" class="window-btn" title="关闭">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="settings-card-section">
        <button class="section-header collapsed">
          <span class="scs-title">专注时间</span>
          <svg class="section-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M4 2l6 5-6 5"/>
          </svg>
        </button>
        <div class="section-body collapsed">
          <div class="setting-row">
            <label>专注时长 <span id="focus-val">25</span> 分钟</label>
            <input type="range" id="focus-duration" min="5" max="60" step="1" value="25" />
          </div>
          <div class="setting-row">
            <label>休息时长 <span id="break-val">5</span> 分钟</label>
            <input type="range" id="break-duration" min="1" max="15" step="1" value="5" />
          </div>
          <div class="setting-row">
            <label>长休息时长 <span id="longbreak-val">15</span> 分钟</label>
            <input type="range" id="longbreak-duration" min="5" max="45" step="1" value="15" />
          </div>
          <div class="setting-row">
            <label>循环次数 <span id="cycle-val">4</span> 次</label>
            <input type="range" id="cycle-count" min="1" max="12" step="1" value="4" />
          </div>
          <div class="total-row">
            <label>总时长约 <span id="total-time">2h</span></label>
          </div>
        </div>
      </div>
      <div class="settings-card-section">
        <button class="section-header collapsed">
          <span class="scs-title">自定义</span>
          <svg class="section-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M4 2l6 5-6 5"/>
          </svg>
        </button>
        <div class="section-body collapsed">
          <div class="subsection-label toggle-row">
            <span>背景粒子</span>
            <button id="toggle-particles" class="toggle-switch" title="开关粒子特效"></button>
          </div>
          <div class="setting-row">
            <label>粒子颜色</label>
            <input type="color" id="color-particle" value="#ffaa66" />
          </div>
          <div class="setting-row">
            <label>粒子大小 <span id="particle-size-val">0.04</span></label>
            <input type="range" id="particle-size" min="0.01" max="0.12" step="0.005" value="0.04" />
          </div>
          <div class="setting-row">
            <label>透明度 <span id="particle-opacity-val">0.50</span></label>
            <input type="range" id="particle-opacity" min="0.05" max="1" step="0.05" value="0.50" />
          </div>
          <div class="setting-row">
            <label>拖尾长度 <span id="trail-length-val">1.0</span></label>
            <input type="range" id="trail-length" min="0.3" max="3.0" step="0.1" value="1.0" />
          </div>
          <div class="subsection-label" style="margin-top:4px">光环</div>
          <div class="setting-row">
            <label>时间环颜色</label>
            <input type="color" id="color-ring" value="#ffffff" />
          </div>
          <div class="setting-row">
            <label>端点粒子颜色</label>
            <input type="color" id="color-spark" value="#ffaa66" />
          </div>
        </div>
      </div>
      <div class="settings-card-section settings-card-about">
        <button class="section-header" id="section-about-toggle">
          <span class="scs-title">关于作者</span>
          <svg class="section-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M4 2l6 5-6 5"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <div id="about-backdrop">
    <canvas id="about-particle-canvas"></canvas>
    <div id="about-card">
      <button id="about-close" class="icon-btn" style="position:absolute;top:12px;right:12px;width:32px;height:32px;z-index:1">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
          <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" fill="none"/>
        </svg>
      </button>
      <div class="about-icon">🍅</div>
      <h2 class="about-title">番茄钟</h2>
      <p class="about-version">v1.0.0</p>
      <p class="about-desc">基于 Three.js 的 3D 沉浸式番茄工作法计时器。<br>在深邃的空间中感受时间的流动，专注每一刻。</p>
      <div class="about-divider"></div>
      <div class="about-author">
        <span class="about-label">作者</span>
        <span class="about-value">fuyue521</span>
      </div>
      <div class="about-links">
        <a href="https://github.com/fuyue521" target="_blank" rel="noopener" class="about-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GitHub
        </a>
        <a href="mailto:Zz_println@outlook.com" class="about-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
          </svg>
          Email
        </a>
      </div>
    </div>
  </div>
  <div id="theme-ripple"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
